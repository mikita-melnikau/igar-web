name: test-and-validate

permissions:
  contents: read
  pull-requests: read
  checks: write
  statuses: write

on:
  pull_request:
    branches: [ main, develop ]

jobs:
  test-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check branch pair
        id: branch_check
        run: |
          if [[ "${{ github.base_ref }}" == "develop" && "${{ github.head_ref }}" == "main" ]] || \
             [[ "${{ github.base_ref }}" == "main" && "${{ github.head_ref }}" == "develop" ]]; then
            echo "should_skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping validation for main <-> develop PR"
          else
            echo "should_skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v3
        if: steps.branch_check.outputs.should_skip != 'true'

      - name: Setup Node.js 24
        if: steps.branch_check.outputs.should_skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        if: steps.branch_check.outputs.should_skip != 'true'
        run: npm ci

      - name: Lint code
        if: steps.branch_check.outputs.should_skip != 'true'
        run: |
          npm run lint
          tsc --noEmit
        
      - name: Run unit tests
        if: steps.branch_check.outputs.should_skip != 'true'
        run: npm run test
