name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare standalone bundle
        run: |
          mkdir -p .next/standalone/.next
          cp -r .next/static .next/standalone/.next/static

      - name: Pack artifacts
        run: |
          tar -czf build.tar.gz -C .next/standalone .

      - name: Upload to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "build.tar.gz"
          target: "/var/www/app"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /var/www/app
            rm -rf .next public server.js node_modules package.json
            tar -xzf build.tar.gz
            rm -f build.tar.gz
            export XDG_RUNTIME_DIR=/run/user/$(id -u)
            systemctl --user restart nextjs
            systemctl --user status nextjs --no-pager